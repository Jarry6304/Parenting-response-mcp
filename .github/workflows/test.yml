# CI:push/PR 自動跑全套驗收 + 型別檢查(in-memory,免 PG、免任何 API key)。
# 「每件全綠才推進」的紀律由此承載,不再只靠手動。

name: test

on:
  push:
    branches: ["**"]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run pytest -q
      - run: uv run pyright
